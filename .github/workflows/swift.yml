---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build & Test (macOS)
        run: swift test -v

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Install libxml2 dev
        run: apt-get update && apt-get install -y libxml2-dev pkg-config
      - name: Verify Swift version
        run: swift --version
      - name: Build & Test (Linux)
        run: swift test -v

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme XMLKit \
            -destination "generic/platform=iOS Simulator"
      - name: Test on iOS Simulator
        # Pick whatever iPhone simulator the runner image actually has —
        # hardcoded model names (e.g. "iPhone 17") vary across the
        # macos-latest image pool and intermittently don't exist.
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -scheme XMLKit \
            -destination "platform=iOS Simulator,name=$DEVICE"

  build-windows:
    # The whole package is a libxml2 wrapper, so unlike SwiftText there is
    # no libxml2-free subset to scope to — the library itself comes from
    # vcpkg. The manifest's Windows branch links "libxml2" and finds
    # headers/libs via the MSVC INCLUDE/LIB environment, which is exactly
    # what vcpkg's installed tree provides; the DLL directory goes on PATH
    # so the test runner can load libxml2 at runtime.
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Install libxml2 (vcpkg)
        run: vcpkg install libxml2:x64-windows
      - name: Add vcpkg DLL directory to PATH for the test runner
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
      # vcpkg paths go in as per-invocation flags, NOT via the INCLUDE/LIB
      # environment: setting LIB at all suppresses the Swift toolchain's own
      # MSVC runtime auto-detection, and even manifest compilation then dies
      # with "could not open 'msvcrt.lib'".
      - name: Build (Windows)
        shell: pwsh
        run: |
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows"
          swift build -v -Xcc "-I$vcpkg\include" -Xlinker "-libpath:$vcpkg\lib"
      - name: Test (Windows)
        shell: pwsh
        timeout-minutes: 15
        run: |
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows"
          swift test -v -Xcc "-I$vcpkg\include" -Xlinker "-libpath:$vcpkg\lib"

  build-android:
    # The Swift Android SDK bundles libxml2 (it ships it for FoundationXML,
    # from Termux packages), so the cross-compile links the sysroot copy.
    # The trap is the HOST: the ubuntu runner has libxml2-dev preinstalled,
    # and CLibXML2's pkg-config lookup happily serves /usr/include/libxml2
    # — ICU-enabled host headers that the Android sysroot can't satisfy
    # ('unicode/ucnv.h' not found). Pointing PKG_CONFIG_LIBDIR at an empty
    # directory blinds host pkg-config so the sysroot's libxml2 wins.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PKG_CONFIG_LIBDIR: /tmp/empty-pkgconfig
    steps:
      - uses: actions/checkout@v6
      - name: Blind host pkg-config (empty PKG_CONFIG_LIBDIR)
        run: mkdir -p /tmp/empty-pkgconfig
      - name: Build & test (Android)
        uses: skiptools/swift-android-action@v2
        with:
          # Full patch version so host toolchain and Android SDK tarballs
          # match (skiptools guidance — a floating "6.3" key drifts them).
          swift-version: "6.3.2"
          free-disk-space: true
          build-tests: true
          run-tests: true
