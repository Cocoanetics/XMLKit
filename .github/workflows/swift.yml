---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build & Test (macOS)
        run: swift test -v

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Install libxml2 dev
        run: apt-get update && apt-get install -y libxml2-dev pkg-config
      - name: Verify Swift version
        run: swift --version
      - name: Build & Test (Linux)
        run: swift test -v

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme XMLKit \
            -destination "generic/platform=iOS Simulator"
      - name: Test on iOS Simulator
        # Pick whatever iPhone simulator the runner image actually has —
        # hardcoded model names (e.g. "iPhone 17") vary across the
        # macos-latest image pool and intermittently don't exist.
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -scheme XMLKit \
            -destination "platform=iOS Simulator,name=$DEVICE"

  build-windows:
    # The whole package is a libxml2 wrapper, so unlike SwiftText there is
    # no libxml2-free subset to scope to — the library itself comes from
    # vcpkg. The manifest's Windows branch links "libxml2" and finds
    # headers/libs via the MSVC INCLUDE/LIB environment, which is exactly
    # what vcpkg's installed tree provides; the DLL directory goes on PATH
    # so the test runner can load libxml2 at runtime.
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Install libxml2 (vcpkg)
        run: vcpkg install libxml2:x64-windows
      - name: Add vcpkg DLL directory to PATH for the test runner
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
      # vcpkg paths go in as per-invocation flags, NOT via the INCLUDE/LIB
      # environment: setting LIB at all suppresses the Swift toolchain's own
      # MSVC runtime auto-detection, and even manifest compilation then dies
      # with "could not open 'msvcrt.lib'". Both include levels are needed
      # (same dual -I as rhx/SwiftLibXML): vcpkg nests headers under
      # include\libxml2\libxml, and libxml2 headers include their siblings
      # as <libxml/...>, so the deeper path must be searchable too.
      - name: Build (Windows)
        shell: pwsh
        run: |
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows"
          swift build -v -Xcc "-I$vcpkg\include\libxml2" -Xcc "-I$vcpkg\include" -Xlinker "-libpath:$vcpkg\lib"
      - name: Test (Windows)
        shell: pwsh
        timeout-minutes: 15
        run: |
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows"
          swift test -v -Xcc "-I$vcpkg\include\libxml2" -Xcc "-I$vcpkg\include" -Xlinker "-libpath:$vcpkg\lib"

  build-android:
    # The official Swift Android SDK bundles a full libxml2.a (2.12.7, built
    # ICU/iconv-free for FoundationXML — verified: HTMLparser.c.o with
    # htmlParseChunk et al. is in the archive) but ships NO libxml2
    # development headers. Worse, the Ubuntu host's libxml2-dev headers are
    # ICU-enabled and leak into the cross-compile via SwiftPM's built-in
    # pkg-config parser (which ignores PKG_CONFIG_LIBDIR and searches
    # hardcoded host paths) — hence 'unicode/ucnv.h' file not found.
    #
    # Fix, within the system-library approach:
    #   1. delete the host's libxml2 dev files so pkg-config finds nothing,
    #   2. provide Debian's ICU-free libxml2 headers (trixie; the
    #      "+really2.9.14" content is the same 2.9-era API this bridge
    #      already builds against on Apple SDKs and Ubuntu jammy; libxml2
    #      kept .so.2 ABI compatibility through 2.12, so the declarations
    #      are valid against the SDK's 2.12.7 archive),
    #   3. link the SDK's own libxml2.a, plus -lz (its .pc requires zlib;
    #      libz is an NDK stable library).
    # The -L path is tied to swift-version below — bump them together.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Remove host libxml2 dev files (poison the cross-compile)
        run: |
          sudo rm -rf /usr/include/libxml2
          sudo find /usr/lib /usr/share -name 'libxml-2.0.pc' -delete 2>/dev/null || true
      - name: Install Debian ICU-free libxml2 headers
        run: |
          curl -sLo /tmp/libxml2-dev.deb "http://deb.debian.org/debian/pool/main/libx/libxml2/libxml2-dev_2.12.7+dfsg+really2.9.14-2.1+deb13u2_amd64.deb"
          dpkg-deb -x /tmp/libxml2-dev.deb /tmp/libxml2-headers
          test -f /tmp/libxml2-headers/usr/include/libxml2/libxml/HTMLparser.h
      - name: Build & test (Android)
        uses: skiptools/swift-android-action@v2
        with:
          # Full patch version so host toolchain and Android SDK tarballs
          # match (skiptools guidance — a floating "6.3" key drifts them).
          swift-version: "6.3.2"
          free-disk-space: true
          build-tests: true
          run-tests: true
          swift-build-flags: >-
            -Xcc -I/tmp/libxml2-headers/usr/include/libxml2
            -Xlinker -L/home/runner/.config/swiftpm/swift-sdks/swift-6.3.2-RELEASE_android.artifactbundle/swift-android/swift-resources/usr/lib/swift_static-x86_64/android
            -Xlinker -lxml2
            -Xlinker -lz
          swift-test-flags: >-
            -Xcc -I/tmp/libxml2-headers/usr/include/libxml2
            -Xlinker -L/home/runner/.config/swiftpm/swift-sdks/swift-6.3.2-RELEASE_android.artifactbundle/swift-android/swift-resources/usr/lib/swift_static-x86_64/android
            -Xlinker -lxml2
            -Xlinker -lz
